<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Battleship Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>⚓ Battleship Pro</h1>

<div class="hud">
    <p id="status">Seu turno</p>
</div>

<div class="container">
    <div>
        <h2>Seu Campo</h2>
        <div id="playerBoard" class="tabuleiro"></div>
    </div>

    <div>
        <h2>Inimigo</h2>
        <div id="enemyBoard" class="tabuleiro"></div>
    </div>
</div>

<div class="log">
    <h3>Log de Jogadas</h3>
    <ul id="logList"></ul>
</div>

<button onclick="reiniciarJogo()">Novo Jogo</button>

<script src="js/game.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
